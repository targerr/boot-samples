server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: datascope-demo

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/datascope_demo?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false

# 数据权限配置
albedo:
  datascope:
    enabled: true                    # 启用数据权限
    default-scope-name: dept_id      # 默认权限字段名（部门ID）
    default-creator-name: created_by # 默认创建者字段名
    sql-log-enabled: true            # 启用 SQL 日志
    aop-enabled: true                # 启用 AOP 切面支持

# MyBatis Plus 配置
mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.example.datascope.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: delFlag
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.example.datascope: DEBUG
    com.albedo.java.plugins.datascope: DEBUG
    org.springframework.security: DEBUG
